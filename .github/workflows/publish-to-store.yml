name: Publish to apps-repo

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_code:
        description: "versionCode (integer)"
        required: true
      version_name:
        description: "versionName (e.g. 0.1.0)"
        required: true
      apk_url:
        description: "APK download URL"
        required: true
      changelog:
        description: "Changelog"
        required: false
        default: ""

jobs:
  publish:
    uses: exisz/apps-repo/.github/workflows/publish.yml@main
    with:
      app_id: au.com.rollersoft.apps
      app_dir: apps-store
      apk_url: ${{ github.event_name == 'release' && github.event.release.assets[0].browser_download_url || inputs.apk_url }}
      version_code: ${{ github.event_name == 'release' && github.run_number || inputs.version_code }}
      version_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version_name }}
      changelog: ${{ github.event_name == 'release' && github.event.release.body || inputs.changelog }}
    secrets: inherit
